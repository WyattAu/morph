name: Nightly Full Build
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  full-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Full build
        run: nix develop --command lake build Morph 2>&1 | tee build.log
      - name: Check for errors
        run: |
          if grep "^error:" build.log; then
            echo "::error::Nightly build has errors"
            exit 1
          fi
      - name: Check for sorry declarations
        run: |
          SORRY_COUNT=$(grep -r "sorry" Morph/ --include="*.lean" | grep -v "no \`sorry\`" | grep -v "sorry placeholders" | grep -v "requires.*sorry" | wc -l)
          echo "Sorry count: $SORRY_COUNT"
          echo "sorry_count=$SORRY_COUNT" >> $GITHUB_OUTPUT
        id: sorry
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-build-log
          path: build.log
          retention-days: 14
