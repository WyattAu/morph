name: Specification Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    name: Run Specification Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install spec-tools
      run: |
        python -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install -e scripts/

    - name: Run tests
      run: .venv/bin/pytest scripts/tests/ -v --tb=short

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
    - name: Send notification
      if: failure()
      run: |
        echo "Specification tests failed. Check the logs for details."
