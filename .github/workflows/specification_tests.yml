name: Specification Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  test:
    name: Run Specification Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('tests/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt
    
    - name: Run linter
      run: |
        pylint tests/specification_test_suite.py --exit-zero
    
    - name: Run type checker
      run: |
        mypy tests/specification_test_suite.py --ignore-missing-imports
    
    - name: Run tests with coverage
      run: |
        cd tests
        pytest specification_test_suite.py -v --cov=tests --cov-report=xml --cov-report=html --cov-fail-under=80
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./tests/coverage.xml
        flags: specification-tests
        name: codecov-umbrella
        fail_ci_if_error: true
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-report-py${{ matrix.python-version }}
        path: tests/htmlcov/
        retention-days: 30
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-py${{ matrix.python-version }}
        path: |
          tests/test-results.xml
          tests/test-report.html
        retention-days: 30
  
  validate-specs:
    name: Validate Specifications
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt
    
    - name: Run specification linter
      run: |
        python scripts/spec_linter.py spec/
    
    - name: Run link checker
      run: |
        python scripts/spec_link_checker.py spec/
    
    - name: Run version validator
      run: |
        python scripts/spec_version_validator.py spec/
    
    - name: Generate validation report
      if: always()
      run: |
        python scripts/spec_version_validator.py spec/ --report=validation-report.json
    
    - name: Upload validation report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: validation-report
        path: validation-report.json
        retention-days: 30
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Run Bandit security scan
      uses: securego/gosec@master
      with:
        args: ./tests/
    
    - name: Run safety check
      run: |
        pip install safety
        safety check --file tests/requirements.txt
  
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, validate-specs, security-scan]
    if: always()
    
    steps:
    - name: Send notification
      if: failure()
      run: |
        echo "Specification tests failed. Check the logs for details."
        # Add your notification logic here (Slack, email, etc.)
