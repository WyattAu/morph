name: Specification Validation
# GitHub Actions Workflow for Specification Validation
# This workflow validates specification files on push and pull requests

on:
  push:
    branches:
      - main
    paths:
      - 'spec/**'
      - 'docs/conventions/**'
      - 'scripts/spec_tools/**'
      - '.github/workflows/spec-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'spec/**'
      - 'docs/conventions/**'
      - 'scripts/spec_tools/**'
      - '.github/workflows/spec-validation.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Specifications
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/pyproject.toml
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e scripts/
          pip install psutil
      
      - name: Format check
        run: |
          echo "Running format check..."
          spec-tools format spec/ --check
        continue-on-error: true
      
      - name: Lint specifications
        run: |
          echo "Running lint check..."
          spec-tools lint spec/ 2>&1 | tee lint-report.txt
          echo ""
          ERROR_COUNT=$(grep -c "^\s*Line.*\[ERROR\]" lint-report.txt || echo "0")
          WARNING_COUNT=$(grep -c "^\s*Line.*\[WARNING\]" lint-report.txt || echo "0")
          echo "Lint summary: $ERROR_COUNT errors, $WARNING_COUNT warnings"
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "::warning::$ERROR_COUNT lint error(s) found in specifications"
          fi
        continue-on-error: true
      
      - name: Validate specifications
        run: |
          echo "Running validation check..."
          spec-tools validate spec/ --check-traceability --check-security --check-performance --check-maintainability --check-risk --check-verification
        continue-on-error: true
      
      - name: Check links
        run: |
          echo "Running link check..."
          spec-tools check-links spec/ --output link-report.json --format json || true
        continue-on-error: true
      
      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports
          path: |
            lint-report.txt
            link-report.json
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Specification Validation Results\n\n';
            
            // Check if link report exists
            if (fs.existsSync('link-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('link-report.json', 'utf8'));
                comment += `### Link Check Results\n`;
                comment += `- Total links: ${report.total_links || 'N/A'}\n`;
                comment += `- Valid links: ${report.valid_links || 'N/A'}\n`;
                comment += `- Broken links: ${(report.broken_links || []).length}\n`;
                comment += `- Orphaned sections: ${(report.orphaned_sections || []).length}\n\n`;
              } catch(e) {
                comment += `### Link Check\nReport parsing error.\n\n`;
              }
            } else {
              comment += `### Link Check\nReport not generated.\n\n`;
            }
            
            // Check lint report
            if (fs.existsSync('lint-report.txt')) {
              const lintContent = fs.readFileSync('lint-report.txt', 'utf8');
              const errorMatches = lintContent.match(/^\s*Line.*\[ERROR\]/gm) || [];
              const warningMatches = lintContent.match(/^\s*Line.*\[WARNING\]/gm) || [];
              comment += `### Lint Results\n`;
              comment += `- Errors: ${errorMatches.length}\n`;
              comment += `- Warnings: ${warningMatches.length}\n\n`;
            }
            
            comment += 'Validation checks completed. Review any warnings above.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
