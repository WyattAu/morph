name: Specification Validation
# GitHub Actions Workflow for Specification Validation
# This workflow validates specification files on push and pull requests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'spec/**'
      - 'docs/conventions/**'
      - 'scripts/spec_tools/**'
      - '.github/workflows/spec-validation.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'spec/**'
      - 'docs/conventions/**'
      - 'scripts/spec_tools/**'
      - '.github/workflows/spec-validation.yml'

jobs:
  validate:
    name: Validate Specifications
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e scripts/
      
      - name: Format check
        run: |
          echo "Running format check..."
          spec-tools format spec/ --check
        continue-on-error: false
      
      - name: Lint specifications
        run: |
          echo "Running lint check..."
          spec-tools lint spec/ --strict
        continue-on-error: false
      
      - name: Validate specifications
        run: |
          echo "Running validation check..."
          spec-tools validate spec/ --check-traceability --check-security --check-performance --check-maintainability --check-risk --check-verification
        continue-on-error: false
      
      - name: Check links
        run: |
          echo "Running link check..."
          spec-tools check-links spec/ --output link-report.json --format json
        continue-on-error: false
      
      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports
          path: |
            link-report.json
          retention-days: 30
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Specification Validation Results\n\n';
            
            // Check if link report exists
            if (fs.existsSync('link-report.json')) {
              const report = JSON.parse(fs.readFileSync('link-report.json', 'utf8'));
              comment += `### Link Check Results\n`;
              comment += `- Total links: ${report.total_links}\n`;
              comment += `- Valid links: ${report.valid_links}\n`;
              comment += `- Broken links: ${report.broken_links.length}\n`;
              comment += `- Orphaned sections: ${report.orphaned_sections.length}\n`;
              comment += `- Self references: ${report.self_references.length}\n\n`;
            }
            
            comment += '✅ All validation checks passed!';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
