# GitLab CI Configuration for Specification Tests

stages:
  - test
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - venv/

test:
  stage: test
  image: python:3.11
  script:
    - python -m pip install --upgrade pip
    - pip install -e scripts/
    - pytest scripts/tests/ -v --tb=short
  only:
    - branches
    - merge_requests

security:bandit:
  stage: security
  image: python:3.11
  script:
    - python -m pip install --upgrade pip
    - pip install -e scripts/
    - pip install bandit[toml]
    - bandit -r scripts/ -f json -o bandit-report.json || true
    - bandit -r scripts/ -f txt -o bandit-report.txt || true
  artifacts:
    paths:
      - bandit-report.json
      - bandit-report.txt
    expire_in: 30 days
  allow_failure: true
  only:
    - branches
    - merge_requests

security:safety:
  stage: security
  image: python:3.11
  script:
    - python -m pip install --upgrade pip
    - pip install -e scripts/
    - pip install safety
    - pip freeze > /tmp/requirements.txt
    - safety check --file /tmp/requirements.txt --json --output safety-report.json || true
    - safety check --file /tmp/requirements.txt --output safety-report.txt || true
  artifacts:
    paths:
      - safety-report.json
      - safety-report.txt
    expire_in: 30 days
  allow_failure: true
  only:
    - branches
    - merge_requests

test:scheduled:
  stage: test
  image: python:3.11
  script:
    - python -m pip install --upgrade pip
    - pip install -e scripts/
    - pytest scripts/tests/ -v --tb=short
  only:
    - schedules
